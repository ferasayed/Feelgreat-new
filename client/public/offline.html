<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feel Great - غير متصل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: rgba(212, 175, 55, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: #d4af37;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f8fafc;
    }
    p {
      font-size: 1.1rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: #d4af37;
      color: #0f172a;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .btn:hover { opacity: 0.9; transform: scale(1.02); }
    .btn:active { transform: scale(0.97); }
    .tips {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      text-align: right;
    }
    .tips h3 {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tips ul {
      list-style: none;
      padding: 0;
    }
    .tips li {
      font-size: 0.9rem;
      color: #94a3b8;
      padding: 0.375rem 0;
      padding-right: 1.25rem;
      position: relative;
    }
    .tips li::before {
      content: "•";
      position: absolute;
      right: 0;
      color: #d4af37;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
    </div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>يبدو أن اتصالك بالإنترنت غير متاح حالياً. تحقق من اتصالك وحاول مرة أخرى.</p>
    <button class="btn" onclick="window.location.reload()">إعادة المحاولة</button>
    <div class="tips">
      <h3>نصائح</h3>
      <ul>
        <li>تحقق من اتصال Wi-Fi أو بيانات الهاتف</li>
        <li>حاول تفعيل وإيقاف وضع الطيران</li>
        <li>الصفحات التي زرتها سابقاً قد تكون متاحة بدون إنترنت</li>
      </ul>
    </div>
  </div>
</body>
</html>
